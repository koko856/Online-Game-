<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flash Uro Game Hub</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f0f0f,#1b2735);
color:white;
}

/* header */

header{

display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
background:rgba(0,0,0,0.5);
backdrop-filter:blur(10px);

}

.logo{

font-size:22px;
font-weight:bold;

}

.admin{

background:#ff9800;
border:none;
padding:8px 14px;
border-radius:6px;
cursor:pointer;

}

/* banner */

.banner{

height:220px;
background:url("https://picsum.photos/1200/400");
background-size:cover;
display:flex;
align-items:center;
justify-content:center;
font-size:35px;
font-weight:bold;
text-shadow:0 0 10px black;

}

/* game grid */

.games{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
padding:25px;

}

.card{

background:rgba(255,255,255,0.05);
border-radius:15px;
overflow:hidden;
backdrop-filter:blur(8px);
transition:0.3s;

}

.card:hover{

transform:translateY(-8px) scale(1.03);
box-shadow:0 0 15px #00e5ff;

}

.card img{

width:100%;
height:140px;
object-fit:cover;

}

.card h3{

padding:10px;

}

.play{

margin:10px;
padding:10px;
border:none;
background:#00e5ff;
color:black;
font-weight:bold;
border-radius:8px;
cursor:pointer;
width:90%;

}

/* fullscreen game */

#gameScreen{

position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
z-index:999;

}

iframe{

width:100%;
height:100%;
border:none;

}

.close{

position:absolute;
top:10px;
right:10px;
background:red;
color:white;
border:none;
padding:10px;

}

</style>

</head>

<body>

<header>

<div class="logo">🎮 𝕆𝕟𝕝𝕚𝕟𝕖 𝔾𝕒𝕞𝕖 ℍ𝕦𝕓</div>

<button class="admin">🎮</button>

</header>

<div class="banner">

🔥 2026 Trending Games

</div>

<div class="games">

<div class="card">

<img src="https://image2url.com/r2/default/images/1773342849448-93847c30-f69b-4f3a-9162-df73223650ca.jpg" alt="image" />

<h3>𝕏𝕆 𝕆𝕟𝕝𝕚𝕟𝕖 𝔾𝕒𝕞𝕖</h3>

<button class="play" onclick="playGame('https://koko856.github.io/koko856-XO-TalkPlay/')">
PLAY
</button>

</div>

<div class="card">

<img src="https://image2url.com/r2/default/images/1773342494199-3b125646-766e-4df2-9da9-63461a832fe2.jpg" alt="image" />

<h3>ℂ𝕙𝕖𝕔𝕜𝕖𝕣 𝕆𝕟𝕝𝕚𝕟𝕖 𝔾𝕒𝕞𝕖</h3>

<button class="play" onclick="playGame('https://mmpbnoe390-sudo.github.io/CheckerOnlineGame-/')">
PLAY


</div>

</div>

<div id="gameScreen">

<button class="close" onclick="closeGame()">X</button>

<iframe id="gameFrame"></iframe>

</div>

<script>

function playGame(link){

document.getElementById("gameFrame").src=link;
document.getElementById("gameScreen").style.display="block";

}

function closeGame(){

document.getElementById("gameScreen").style.display="none";
document.getElementById("gameFrame").src="";

}

</script>

</body>
</html>
